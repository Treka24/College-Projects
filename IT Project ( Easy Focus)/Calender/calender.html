<!DOCTYPE html>
<html>
<head>
    <title> To-Do-Calendar </title>
    <link rel="stylesheet" href="calender_style.css">
    <link rel="stylesheet" href="../Notification/Notification_styles.css">
</head>
<body>
    <h1> To-Do-Calendar </h1>
    
  <div id="quoteBox">
    <img src="../Notification/quo.jpg" class="quote-img" alt="Quote">
    <p id="quoteText">Quote goes here</p>
    <button id="closeBtn">×</button>
  </div>
    <div class="controls">
        <button onclick="prevMonth()"> ◀️ </button>
        <select id="month-select" onchange="changeMonth()"></select>
        <select id="year-select" onchange="changeYear()"></select>
        <button onclick="nextMonth()"> ▶️ </button>
    </div>

    <div id="calendar"></div>

    <div id="note-popup" class="hidden">
        <textarea id="note-text" placeholder="Write note here : "></textarea>
        <button onclick="saveNote()">Save Note</button>
        <button onclick="clearNotes()">Clear Notes</button>
        <button onclick="closePopup()">Cancel</button>
    </div>

    <script src="Calender_script.js"></script>
      <script src="../Notification/Notification_script.js"></script>
</body>
