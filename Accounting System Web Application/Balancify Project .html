<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balancify · Accounting System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Balancify Project.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style></style>
  </head>
  <body>
    <div id="appWrapper" class="app-wrapper">
      <header>
        <div class="logo">
          <i class="fas fa-cubes"></i>
          <h1>Balancify <span>| Capital University</span></h1>
        </div>
        <div class="user-info">
          <i class="fas fa-calendar-alt"></i>
          <span id="currentDateSpan">2026-05-12</span>
        </div>
      </header>

      <nav>
        <button class="nav-btn active" data-section="accounts">
          <i class="fas fa-sitemap"></i> Chart of Accounts
        </button>
        <button class="nav-btn" data-section="entries">
          <i class="fas fa-pen"></i> Journal Entries
        </button>
        <button class="nav-btn" data-section="reports">
          <i class="fas fa-chart-pie"></i> Reports
        </button>
      </nav>

      <main>
        <section id="accounts" class="section visible">
          <div class="card">
            <h2><i class="fas fa-list-ul"></i> Chart of Accounts</h2>
            <div class="form-panel">
              <div class="input-group">
                <label>Account Name</label
                ><input
                  type="text"
                  id="accName"
                  placeholder="e.g., New Asset"
                />
              </div>
              <div class="input-group">
                <label>Type</label
                ><select id="accType">
                  <option value="Asset">Asset</option>
                  <option value="Liability">Liability</option>
                  <option value="Equity">Equity</option>
                  <option value="Revenue">Revenue</option>
                  <option value="Expense">Expense</option>
                </select>
              </div>
              <button class="btn" onclick="addAccount()">
                <i class="fas fa-plus-circle"></i> Add Account
              </button>
            </div>
            <div class="search-box">
              <i class="fas fa-search"></i
              ><input
                type="text"
                id="accountSearch"
                placeholder="Search accounts..."
                onkeyup="filterAccounts()"
              />
            </div>
            <div style="overflow-x: auto">
              <table id="accountsTable">
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="accountsTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section id="entries" class="section">
          <div class="card">
            <h2><i class="fas fa-book"></i> Journal Entry</h2>
            <div class="form-panel">
              <div class="input-group">
                <label>Date</label
                ><input type="date" id="date" value="2026-04-20" />
              </div>
              <div class="input-group">
                <label>Account</label
                ><select id="entryAccount"></select>
              </div>
              <div class="input-group">
                <label>Type</label
                ><select id="entryType">
                  <option value="Debit">Debit</option>
                  <option value="Credit">Credit</option>
                </select>
              </div>
              <div class="input-group">
                <label>Amount</label
                ><input type="number" id="amount" step="0.01" />
              </div>
              <button class="btn" onclick="addEntry()">
                <i class="fas fa-save"></i> Save Entry
              </button>
              <button class="btn" onclick="clearEntryForm()">
                <i class="fas fa-undo-alt"></i> Reset
              </button>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Account</th>
                  <th>Dr/Cr</th>
                  <th>Amount</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="entriesTable"></tbody>
            </table>
          </div>
        </section>

        <section id="reports" class="section">
          <div class="card">
            <h2><i class="fas fa-chart-pie"></i> Financial Reports</h2>
            <div class="date-range">
              <div class="input-group">
                <label>From</label><input type="date" id="reportFromDate" />
              </div>
              <div class="input-group">
                <label>To</label><input type="date" id="reportToDate" />
              </div>
              <button class="btn" onclick="applyDateFilter()">
                <i class="fas fa-filter"></i> Apply
              </button>
              <button class="btn btn-success" onclick="exportToExcel()">
                <i class="fas fa-file-excel"></i> Export Excel
              </button>
            </div>
            <div
              class="report-buttons"
              style="display: flex; gap: 12px; margin-bottom: 20px"
            >
              <button class="btn" onclick="generateTrialBalance()">
                Trial Balance
              </button>
              <button class="btn" onclick="generateIncome()">
                Income Statement
              </button>
              <button class="btn" onclick="generateBalance()">
                Balance Sheet
              </button>
            </div>
            <div id="reportOutput"></div>
          </div>
        </section>
      </main>
      <footer>&copy; 2026 Balancify | Capital University, Cairo, Egypt</footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
